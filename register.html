<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Register</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#000;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:-apple-system,'SF Pro Display',sans-serif;
  color:white;
  padding:32px 24px;
}

.screen { display:none; flex-direction:column; align-items:center; width:100%; gap:14px; }
.screen.active { display:flex; }

.logo { font-size:48px; margin-bottom:4px; }
.title { font-size:26px; font-weight:700; margin-bottom:2px; }
.sub { font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:12px; text-align:center; }

/* PIN PAD */
.pin-dots { display:flex; gap:16px; margin-bottom:24px; }
.dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:background 0.15s;
}
.dot.filled { background:#ff9f0a; }

.pin-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  width:100%;
  max-width:300px;
}
.pin-key {
  border:none;
  border-radius:50%;
  aspect-ratio:1;
  font-size:28px;
  font-weight:300;
  color:white;
  background:#1c1c1e;
  cursor:pointer;
  font-family:-apple-system,sans-serif;
  transition:opacity 0.1s,transform 0.1s;
  display:flex; align-items:center; justify-content:center;
}
.pin-key:active { opacity:0.5; transform:scale(0.93); }
.pin-key.del { font-size:20px; }
.pin-key.empty { background:transparent; pointer-events:none; }

.pin-error { color:#ff3b30; font-size:13px; min-height:18px; }

/* REGISTER FORM */
.inp {
  width:100%;
  background:#1c1c1e;
  border:none;
  border-radius:14px;
  padding:16px 18px;
  color:white;
  font-size:16px;
  font-family:-apple-system,sans-serif;
  outline:none;
}
.inp::placeholder { color:rgba(255,255,255,0.25); }

.reg-btn {
  width:100%;
  background:#ff9f0a;
  border:none;
  border-radius:14px;
  padding:16px;
  color:white;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  font-family:-apple-system,sans-serif;
  margin-top:4px;
}
.reg-btn:active { opacity:0.75; }
.reg-error { color:#ff3b30; font-size:13px; min-height:18px; text-align:center; }
.success { color:#30d158; font-size:15px; font-weight:600; text-align:center; }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="screen active" id="pinScreen">
  <div class="logo">🔐</div>
  <div class="title">Enter PIN</div>
  <div class="sub">This page is private</div>
  <div class="pin-dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pin('1')">1</button>
    <button class="pin-key" onclick="pin('2')">2</button>
    <button class="pin-key" onclick="pin('3')">3</button>
    <button class="pin-key" onclick="pin('4')">4</button>
    <button class="pin-key" onclick="pin('5')">5</button>
    <button class="pin-key" onclick="pin('6')">6</button>
    <button class="pin-key" onclick="pin('7')">7</button>
    <button class="pin-key" onclick="pin('8')">8</button>
    <button class="pin-key" onclick="pin('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pin('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- REGISTER SCREEN -->
<div class="screen" id="regScreen">
  <div class="logo">💵</div>
  <div class="title">Create Account</div>
  <div class="sub">Tips Calculator</div>
  <input class="inp" type="text" id="regName" placeholder="Your name">
  <input class="inp" type="email" id="regEmail" placeholder="Email">
  <input class="inp" type="password" id="regPass" placeholder="Password (min 6 chars)">
  <div class="reg-error" id="regError"></div>
  <button class="reg-btn" onclick="register()">Create Account</button>
  <div class="success" id="regSuccess"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-mPSc5yXJHrKNvw51S6Z__lqwNwSmLlY",
  authDomain: "dinoland-6b5c9.firebaseapp.com",
  projectId: "dinoland-6b5c9",
  storageBucket: "dinoland-6b5c9.firebasestorage.app",
  messagingSenderId: "246367253146",
  appId: "1:246367253146:web:af966cde2953e484d26523"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const errEl = document.getElementById('regError');
  const sucEl = document.getElementById('regSuccess');
  errEl.textContent = ''; sucEl.textContent = '';

  if (!name)  { errEl.textContent = 'Enter your name.'; return; }
  if (!email) { errEl.textContent = 'Enter your email.'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    sucEl.textContent = '✅ Account created! You can now log in.';
    document.getElementById('regName').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPass').value = '';
  } catch(e) {
    const code = e.code || '';
    if (code === 'auth/email-already-in-use') errEl.textContent = 'This email is already registered.';
    else if (code === 'auth/invalid-email')   errEl.textContent = 'Invalid email address.';
    else if (code === 'auth/weak-password')   errEl.textContent = 'Password is too weak.';
    else errEl.textContent = 'Something went wrong. Try again.';
  }
};
</script>

<script>
const CORRECT = '28137';
let entered = '';

function pin(v) {
  if (entered.length >= 5) return;
  entered += v;
  updateDots();
  if (entered.length === 5) checkPin();
}

function pinDel() {
  entered = entered.slice(0, -1);
  document.getElementById('pinError').textContent = '';
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 5; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < entered.length);
  }
}

function checkPin() {
  if (entered === CORRECT) {
    document.getElementById('pinScreen').classList.remove('active');
    document.getElementById('regScreen').classList.add('active');
  } else {
    document.getElementById('pinError').textContent = 'Wrong PIN. Try again.';
    entered = '';
    updateDots();
  }
}
</script>
</body>
</html>
